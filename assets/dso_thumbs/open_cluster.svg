  <!-- Faint background stars -->
  <circle cx="88" cy="72" r="0.7" fill="white" fill-opacity="0.5"/>
  <circle cx="32" cy="68" r="0.6" fill="white" fill-opacity="0.4"/>
  <circle cx="56" cy="88" r="0.7" fill="white" fill-opacity="0.45"/>
  <circle cx="88" cy="44" r="0.6" fill="white" fill-opacity="0.45"/>
