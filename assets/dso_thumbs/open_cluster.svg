  <circle cx="52" cy="44" r="1.3" fill="#d0e0ff" fill-opacity="0.75"/>
  <circle cx="78" cy="66" r="1.4" fill="#e8f0ff" fill-opacity="0.75"/>
  <circle cx="44" cy="76" r="1.2" fill="#c0d0f0" fill-opacity="0.7"/>
  <circle cx="66" cy="82" r="1.3" fill="#d0e0ff" fill-opacity="0.7"/>
