  <circle cx="55" cy="72" r="1.8" fill="#d8e8ff" fill-opacity="0.85"/>
  <circle cx="68" cy="70" r="2.4" fill="#ffffff" fill-opacity="0.9"/>
  <circle cx="42" cy="64" r="1.5" fill="#c8d8ff" fill-opacity="0.8"/>
