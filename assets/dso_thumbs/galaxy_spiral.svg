  <ellipse cx="60" cy="60" rx="4" ry="3" fill="#ffffff" fill-opacity="0.95"/>
  <!-- Stars -->
  <circle cx="35" cy="30" r="0.8" fill="white" fill-opacity="0.7"/>
  <circle cx="90" cy="40" r="0.6" fill="white" fill-opacity="0.6"/>
  <circle cx="25" cy="80" r="0.7" fill="white" fill-opacity="0.5"/>
  <circle cx="95" cy="85" r="0.5" fill="white" fill-opacity="0.6"/>
  <circle cx="50" cy="20" r="0.6" fill="white" fill-opacity="0.5"/>
  <circle cx="80" cy="95" r="0.7" fill="white" fill-opacity="0.5"/>
</svg>
